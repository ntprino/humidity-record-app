<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="습도기록" />
  <title>습도 관리 기록</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.72rem + 0.16vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.82rem + 0.24vw, 1rem);
      --text-base: clamp(1rem, 0.96rem + 0.2vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.4vw, 1.375rem);
      --text-xl: clamp(1.45rem, 1.2rem + 0.8vw, 2rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
      --color-bg: #f7f6f2; --color-surface: #fcfbf8; --color-surface-2: #f4f1eb; --color-surface-3: #eeebe4; --color-border: #d4d1ca;
      --color-text: #28251d; --color-text-muted: #706b63; --color-text-faint: #a09a90; --color-text-inverse: #fbfaf7;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-soft: #d6e5e3; --color-danger: #964219; --color-danger-soft: #ead9cf;
      --radius-md: 0.9rem; --radius-lg: 1.25rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(26,24,20,.05), 0 6px 18px rgba(26,24,20,.04);
      --shadow-md: 0 10px 30px rgba(26,24,20,.08);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1d1c1a; --color-surface-2: #242220; --color-surface-3: #2d2b28; --color-border: #3b3834;
      --color-text: #ece7df; --color-text-muted: #bbb5ab; --color-text-faint: #8d867b; --color-text-inverse: #171614;
      --color-primary: #56a0aa; --color-primary-hover: #74b4be; --color-primary-soft: #2f3d3e; --color-danger: #d49a7a; --color-danger-soft: #3b302a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.18), 0 6px 18px rgba(0,0,0,.16);
      --shadow-md: 0 12px 32px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; }
    body { margin: 0; min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: linear-gradient(180deg, var(--color-bg), var(--color-surface-2)); }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    input, textarea { width: 100%; min-height: 52px; padding: 0.95rem 1rem; border-radius: var(--radius-md); border: 1px solid color-mix(in srgb, var(--color-text) 11%, transparent); background: var(--color-surface); color: var(--color-text); transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition); }
    textarea { min-height: 86px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 18%, transparent); }
    .app { max-width: 980px; margin: 0 auto; padding: max(env(safe-area-inset-top), 18px) 16px max(env(safe-area-inset-bottom), 20px); }
    .shell { background: color-mix(in srgb, var(--color-surface) 92%, transparent); border: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent); border-radius: 30px; overflow: hidden; box-shadow: var(--shadow-md); }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-4); padding: var(--space-5); background: var(--color-surface); border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent); }
    .brand { display: flex; gap: var(--space-3); align-items: center; }
    .logo { width: 42px; height: 42px; color: var(--color-primary); }
    h1 { margin: 0; font-size: var(--text-xl); line-height: 1.08; }
    .subline { margin-top: 6px; color: var(--color-text-muted); font-size: var(--text-sm); }
    .top-actions, .toolbar, .filters, .edit-actions, .record-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .top-actions { justify-content: flex-end; }
    .theme-btn, .ghost-btn, .primary-btn, .danger-btn, .chip-btn, .save-edit-btn { min-height: 44px; border-radius: var(--radius-full); padding: 0 16px; transition: transform var(--transition), background var(--transition), color var(--transition), border-color var(--transition); }
    .theme-btn, .ghost-btn, .chip-btn { background: var(--color-surface-2); color: var(--color-text); border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent); }
    .primary-btn, .save-edit-btn { background: var(--color-primary); color: var(--color-text-inverse); font-weight: 700; }
    .danger-btn { background: var(--color-danger-soft); color: var(--color-danger); font-weight: 700; }
    .main { display: grid; gap: var(--space-5); padding: var(--space-5); }
    .card { background: var(--color-surface-2); border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent); border-radius: 24px; padding: var(--space-5); box-shadow: var(--shadow-sm); }
    .section-head { display: flex; justify-content: space-between; gap: var(--space-4); align-items: flex-start; flex-wrap: wrap; }
    .section-head h2 { margin: 0; font-size: var(--text-lg); }
    .hint, .foot, .edit-note, .migration-note { margin-top: 6px; color: var(--color-text-muted); font-size: var(--text-sm); }
    .quick-meta, .stats, .form-grid, .meters { display: grid; gap: 12px; }
    .quick-meta, .form-grid, .meters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-top: var(--space-4); }
    .meta-box, .stat-box, .meter { background: var(--color-surface); border: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent); border-radius: 20px; padding: 14px 16px; }
    .meta-label, .stat-label, .meter .name { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: 6px; }
    .meta-value, .stat-value, .meter .value { font-variant-numeric: tabular-nums lining-nums; font-weight: 700; }
    .meter .value { font-size: 1.35rem; }
    .form-grid { margin-top: var(--space-4); }
    .field.full { grid-column: 1 / -1; }
    .label { display: block; margin-bottom: 8px; font-size: var(--text-sm); font-weight: 700; }
    .record-list { display: grid; gap: 12px; margin-top: var(--space-4); }
    .record { background: var(--color-surface); border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent); border-radius: 22px; padding: 16px; display: grid; gap: 14px; }
    .record.editing { border-color: color-mix(in srgb, var(--color-primary) 48%, transparent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 10%, transparent); }
    .record-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; border-radius: var(--radius-full); background: var(--color-primary-soft); color: var(--color-primary); padding: 7px 12px; font-size: var(--text-xs); font-weight: 700; }
    .badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .stamp { color: var(--color-text-muted); font-size: var(--text-sm); font-variant-numeric: tabular-nums lining-nums; }
    .memo { white-space: pre-wrap; }
    .empty { background: var(--color-surface); border: 1px dashed color-mix(in srgb, var(--color-text) 18%, transparent); border-radius: 22px; padding: 32px 20px; text-align: center; color: var(--color-text-muted); }
    .migration-banner { margin-top: var(--space-4); padding: 14px 16px; border-radius: 18px; background: var(--color-primary-soft); color: var(--color-text); display: none; }
    .migration-banner.show { display: block; }
    @media (max-width: 720px) {
      .topbar, .main, .card { padding: var(--space-4); }
      .topbar, .record-head { flex-direction: column; }
      .top-actions { width: 100%; justify-content: flex-start; }
      .quick-meta, .form-grid, .stats, .meters { grid-template-columns: 1fr; }
      .toolbar > *, .filters > *, .edit-actions > *, .record-actions > * { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <svg class="logo" viewBox="0 0 64 64" fill="none" aria-label="습도 기록 로고"><path d="M32 8C23 20 16 28 16 39.5C16 48.6 23.4 56 32 56C40.6 56 48 48.6 48 39.5C48 28 41 20 32 8Z" stroke="currentColor" stroke-width="4"/><path d="M25 40C25 44.4 28.6 48 33 48" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
          <div>
            <h1>습도 관리 기록</h1>
            <div class="subline">이전 기록까지 합쳐서 유지하는 수정 가능 버전</div>
          </div>
        </div>
        <div class="top-actions">
          <button class="theme-btn" type="button" id="themeToggle" aria-label="테마 전환">🌙</button>
          <button class="ghost-btn" type="button" id="exportBtn">CSV 내보내기</button>
        </div>
      </header>

      <main class="main">
        <section class="card">
          <div class="section-head"><div><h2>새 기록 입력</h2><p class="hint">저장한 기록은 아래에서 수정할 수 있고, 이전 버전 기록도 합쳐서 불러옵니다.</p></div></div>
          <div class="migration-banner" id="migrationBanner"></div>
          <div class="quick-meta" style="margin-top: var(--space-4);">
            <div class="meta-box"><div class="meta-label">현재 날짜</div><div class="meta-value" id="currentDate">-</div></div>
            <div class="meta-box"><div class="meta-label">현재 시간</div><div class="meta-value" id="currentTime">-</div></div>
          </div>
          <div class="form-grid">
            <div class="field"><label class="label" for="humidInside">제습기 안 습도계</label><input id="humidInside" type="number" inputmode="decimal" min="0" max="100" step="0.1" placeholder="예: 48" /></div>
            <div class="field"><label class="label" for="humidIndependent">독립 습도계</label><input id="humidIndependent" type="number" inputmode="decimal" min="0" max="100" step="0.1" placeholder="예: 52" /></div>
            <div class="field full"><label class="label" for="memo">메모</label><textarea id="memo" placeholder="바람 강도, 설정값, 필터 청소, 방 상태 등을 적어두세요"></textarea></div>
          </div>
          <div class="toolbar"><button class="primary-btn" type="button" id="saveBtn">기록 저장</button><button class="ghost-btn" type="button" id="resetBtn">입력 지우기</button></div>
          <div class="foot">같은 브라우저/같은 홈화면 앱에서 열면 기록이 계속 누적됩니다.</div>
        </section>

        <section class="card">
          <div class="section-head"><div><h2>기록 보기</h2><p class="hint">검색, 수정, 삭제가 가능합니다.</p></div><button class="danger-btn" type="button" id="deleteAllBtn">전체 삭제</button></div>
          <div class="stats">
            <div class="stat-box"><div class="stat-label">총 기록 수</div><div class="stat-value" id="totalCount">0건</div></div>
            <div class="stat-box"><div class="stat-label">최근 제습기 안</div><div class="stat-value" id="lastInside">-</div></div>
            <div class="stat-box"><div class="stat-label">최근 독립 습도계</div><div class="stat-value" id="lastIndependent">-</div></div>
          </div>
          <div class="filters"><input id="searchInput" type="search" placeholder="메모나 날짜로 검색" /><button class="chip-btn" type="button" id="showAllBtn">전체 보기</button></div>
          <div class="record-list" id="recordList"></div>
          <div class="empty" id="emptyState">아직 기록이 없습니다.</div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'humidity-log-records-master-v1';
    const LEGACY_KEYS = ['humidity-log-records-v3', 'humidity-log-records-v2', 'humidity-log-records-v1', 'humidity-pwa-records-v1'];
    const THEME_KEY = 'humidity-log-theme-v1';
    const state = { records: [], filter: '', editingId: null, importedCount: 0 };

    const html = document.documentElement;
    const currentDate = document.getElementById('currentDate');
    const currentTime = document.getElementById('currentTime');
    const humidInside = document.getElementById('humidInside');
    const humidIndependent = document.getElementById('humidIndependent');
    const memo = document.getElementById('memo');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const exportBtn = document.getElementById('exportBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const searchInput = document.getElementById('searchInput');
    const recordList = document.getElementById('recordList');
    const emptyState = document.getElementById('emptyState');
    const totalCount = document.getElementById('totalCount');
    const lastInside = document.getElementById('lastInside');
    const lastIndependent = document.getElementById('lastIndependent');
    const themeToggle = document.getElementById('themeToggle');
    const migrationBanner = document.getElementById('migrationBanner');

    function safeSet(key, value) { try { localStorage.setItem(key, value); return true; } catch { return false; } }
    function safeGet(key) { try { return localStorage.getItem(key); } catch { return null; } }
    function pad(n) { return String(n).padStart(2, '0'); }
    function nowParts() { const d = new Date(); return { iso: d.toISOString(), date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, time: `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}` }; }
    function refreshClock() { const n = nowParts(); currentDate.textContent = n.date; currentTime.textContent = n.time; }
    function setTheme(theme) { html.setAttribute('data-theme', theme); themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙'; safeSet(THEME_KEY, theme); }
    function initTheme() { const saved = safeGet(THEME_KEY); if (saved === 'dark' || saved === 'light') return setTheme(saved); setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }
    function normalizeRecord(r, index) {
      const date = r.date || '';
      const time = r.time || '';
      const iso = r.iso || `${date}T${time || '00:00:00'}`;
      return {
        id: r.id || `legacy-${index}-${date}-${time}-${r.inside ?? r.humidIn ?? ''}-${r.independent ?? r.humidOut ?? ''}`,
        iso,
        date,
        time,
        inside: Number(r.inside ?? r.humidIn ?? ''),
        independent: Number(r.independent ?? r.humidOut ?? ''),
        memo: String(r.memo || '')
      };
    }
    function uniqueKey(r) { return [r.date, r.time, r.inside, r.independent, r.memo].join('|'); }
    function mergeAllRecords() {
      const merged = [];
      const seen = new Set();
      const keys = [STORAGE_KEY, ...LEGACY_KEYS];
      keys.forEach(key => {
        const raw = safeGet(key);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return;
          parsed.forEach((item, idx) => {
            const r = normalizeRecord(item, idx);
            if (!r.date && !r.time) return;
            const sig = uniqueKey(r);
            if (seen.has(sig)) return;
            seen.add(sig);
            merged.push(r);
          });
        } catch {}
      });
      merged.sort((a, b) => (b.iso || '').localeCompare(a.iso || ''));
      state.importedCount = merged.length;
      state.records = merged;
      safeSet(STORAGE_KEY, JSON.stringify(merged));
    }
    function persistRecords() { safeSet(STORAGE_KEY, JSON.stringify(state.records)); }
    function clearInputs() { humidInside.value = ''; humidIndependent.value = ''; memo.value = ''; humidInside.focus(); }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML.replace(/\n/g, '<br>'); }
    function filteredRecords() {
      const q = state.filter.trim().toLowerCase();
      if (!q) return state.records;
      return state.records.filter(r => [r.date, r.time, r.memo, String(r.inside), String(r.independent)].join(' ').toLowerCase().includes(q));
    }
    function updateStats() {
      totalCount.textContent = `${state.records.length}건`;
      const latest = state.records[0];
      lastInside.textContent = latest ? `${latest.inside}%` : '-';
      lastIndependent.textContent = latest ? `${latest.independent}%` : '-';
    }
    function renderMigrationBanner() {
      if (!state.records.length) return;
      migrationBanner.textContent = `이전 버전 기록까지 합쳐서 ${state.records.length}건을 불러왔습니다.`;
      migrationBanner.classList.add('show');
    }
    function render() {
      const rows = filteredRecords();
      recordList.innerHTML = '';
      emptyState.style.display = rows.length ? 'none' : 'block';
      rows.forEach((record, idx) => {
        const editing = state.editingId === record.id;
        const el = document.createElement('article');
        el.className = `record${editing ? ' editing' : ''}`;
        if (editing) {
          el.innerHTML = `
            <div class="record-head"><div><div class="badge">수정 중</div><div class="stamp" style="margin-top:8px;">원래 기록: ${record.date} ${record.time}</div></div></div>
            <div class="meters">
              <div><label class="label">제습기 안 습도계</label><input type="number" inputmode="decimal" step="0.1" min="0" max="100" value="${record.inside}" data-edit-inside="${record.id}"></div>
              <div><label class="label">독립 습도계</label><input type="number" inputmode="decimal" step="0.1" min="0" max="100" value="${record.independent}" data-edit-independent="${record.id}"></div>
            </div>
            <div><label class="label">메모</label><textarea data-edit-memo="${record.id}">${record.memo || ''}</textarea></div>
            <div class="edit-actions"><button class="save-edit-btn" type="button" data-save-edit="${record.id}">수정 저장</button><button class="ghost-btn" type="button" data-cancel-edit="${record.id}">취소</button></div>
            <div class="edit-note">날짜와 시간은 유지하고, 습도와 메모만 수정합니다.</div>
          `;
        } else {
          el.innerHTML = `
            <div class="record-head">
              <div><div class="badge">기록 ${rows.length - idx}</div><div class="stamp" style="margin-top:8px;">${record.date} ${record.time}</div></div>
              <div class="record-actions"><button class="ghost-btn" type="button" data-start-edit="${record.id}">수정</button><button class="ghost-btn" type="button" data-id="${record.id}">삭제</button></div>
            </div>
            <div class="meters">
              <div class="meter"><div class="name">제습기 안 습도계</div><div class="value">${record.inside}%</div></div>
              <div class="meter"><div class="name">독립 습도계</div><div class="value">${record.independent}%</div></div>
            </div>
            <div><div class="meta-label">메모</div><div class="memo">${record.memo ? escapeHtml(record.memo) : '<span style="color:var(--color-text-faint);">메모 없음</span>'}</div></div>
          `;
        }
        recordList.appendChild(el);
      });
      updateStats();
    }

    saveBtn.addEventListener('click', () => {
      const inside = humidInside.value.trim();
      const independent = humidIndependent.value.trim();
      if (!inside || !independent) return alert('습도 숫자 두 칸을 먼저 입력해 주세요.');
      const n = nowParts();
      state.records.unshift({ id: crypto.randomUUID(), iso: n.iso, date: n.date, time: n.time, inside: Number(inside), independent: Number(independent), memo: memo.value.trim() });
      persistRecords(); render(); clearInputs();
    });
    resetBtn.addEventListener('click', clearInputs);
    themeToggle.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
    searchInput.addEventListener('input', e => { state.filter = e.target.value; render(); });
    showAllBtn.addEventListener('click', () => { state.filter = ''; searchInput.value = ''; render(); });
    recordList.addEventListener('click', e => {
      const startEditBtn = e.target.closest('[data-start-edit]');
      if (startEditBtn) { state.editingId = startEditBtn.dataset.startEdit; render(); return; }
      const cancelEditBtn = e.target.closest('[data-cancel-edit]');
      if (cancelEditBtn) { state.editingId = null; render(); return; }
      const saveEditBtn = e.target.closest('[data-save-edit]');
      if (saveEditBtn) {
        const id = saveEditBtn.dataset.saveEdit;
        const inside = recordList.querySelector(`[data-edit-inside="${id}"]`).value.trim();
        const independent = recordList.querySelector(`[data-edit-independent="${id}"]`).value.trim();
        const memoVal = recordList.querySelector(`[data-edit-memo="${id}"]`).value.trim();
        if (!inside || !independent) return alert('수정할 습도 숫자 두 칸을 입력해 주세요.');
        state.records = state.records.map(r => r.id === id ? { ...r, inside: Number(inside), independent: Number(independent), memo: memoVal } : r);
        persistRecords(); state.editingId = null; render(); return;
      }
      const deleteBtn = e.target.closest('[data-id]');
      if (deleteBtn) {
        state.records = state.records.filter(r => r.id !== deleteBtn.dataset.id);
        if (state.editingId === deleteBtn.dataset.id) state.editingId = null;
        persistRecords(); render();
      }
    });
    deleteAllBtn.addEventListener('click', () => {
      if (!state.records.length) return;
      if (!confirm('기록을 모두 삭제할까요?')) return;
      state.records = []; state.editingId = null; persistRecords(); render();
    });
    exportBtn.addEventListener('click', () => {
      if (!state.records.length) return alert('내보낼 기록이 없습니다.');
      const header = ['date','time','dehumidifier_meter','independent_meter','memo'];
      const rows = state.records.map(r => [r.date, r.time, r.inside, r.independent, (r.memo || '').replace(/"/g, '""')]);
      const csv = [header.join(','), ...rows.map(row => row.map((cell, i) => i === 4 ? `"${cell}"` : cell).join(','))].join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); const n = nowParts();
      a.href = url; a.download = `humidity-log-${n.date}-${n.time.replace(/:/g, '-')}.csv`; a.click(); URL.revokeObjectURL(url);
    });

    initTheme();
    mergeAllRecords();
    refreshClock();
    setInterval(refreshClock, 1000);
    renderMigrationBanner();
    render();
  </script>
</body>
</html>
